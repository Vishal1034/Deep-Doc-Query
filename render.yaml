services:
  - type: web
    name: local-rag-assistant-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disks:
      - name: rag-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: DOCS_DIR
        value: /var/data/docs
      - key: CHROMA_PATH
        value: /var/data/chroma
